name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Create env for build
        run: |
          echo "VITE_AGENT_API_URL=${{ secrets.VITE_AGENT_API_URL }}" >> .env.production
          echo "VITE_AGENT_API_KEY=${{ secrets.VITE_AGENT_API_KEY }}" >> .env.production
        continue-on-error: true

      - name: Install and build
        run: |
          npm ci
          npm run build -- --base=/${{ github.event.repository.name }}/ --outDir=dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@4
